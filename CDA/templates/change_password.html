{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Password | Bharat Sanjeevani</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body class="bg-stone-50 flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-10 border border-gray-100">

    <!-- Header -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-green-900 border-b border-gray-200 pb-4">
            Change Password
        </h1>
        <p class="text-gray-500 text-sm mt-4">
            Secure your account 🌿
        </p>
    </div>

    <!-- Messages -->
    {% if messages %}
        <div class="mb-6">
            {% for message in messages %}
                <div class="p-4 rounded mb-2 {% if message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200{% else %}bg-green-100 text-green-800 border border-green-200{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <!-- Form -->
    <form method="POST">
        {% csrf_token %}

        <div class="mb-5">
            <label class="block text-sm font-bold text-green-800 uppercase tracking-wider mb-2">
                Current Password
            </label>

            <input type="password"
                   name="old_password"
                   class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-green-700 focus:ring-1 focus:ring-green-700 transition"
                   placeholder="Enter current password"
                   required>
        </div>

        <div class="mb-5">
            <label class="block text-sm font-bold text-green-800 uppercase tracking-wider mb-2">
                New Password
            </label>

            <input type="password"
                   name="new_password"
                   class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-green-700 focus:ring-1 focus:ring-green-700 transition"
                   placeholder="Enter new password"
                   required>
        </div>

        <div class="mb-8">
            <label class="block text-sm font-bold text-green-800 uppercase tracking-wider mb-2">
                Confirm New Password
            </label>

            <input type="password"
                   name="confirm_password"
                   class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-green-700 focus:ring-1 focus:ring-green-700 transition"
                   placeholder="Confirm new password"
                   required>
        </div>

        <button type="submit"
                class="w-full bg-green-800 text-white font-semibold py-3 rounded-xl hover:bg-green-900 transition-all duration-300 shadow-md">
            Update Password
        </button>

    </form>

    <div class="mt-6 text-center">
        <a href="{% url 'profile' %}" class="text-gray-500 font-medium hover:text-green-800 transition">
            Cancel and go back
        </a>
    </div>

</div>

</body>
</html>
