{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Email | Bharat Sanjeevani</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body class="bg-cream flex items-center justify-center min-h-screen" style="background-color: #fdfbf7;">

<div class="w-full max-w-md bg-white shadow-xl rounded-lg p-10 border border-gray-100">

    <!-- Logo -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-green-800 tracking-tight">
            BHARAT<span class="font-light text-gray-400">SANJEEVANI</span>
        </h1>
        <p class="text-gray-500 text-sm mt-2">
            Verify your email address ✉️
        </p>
    </div>

    <!-- Messages -->
    {% if messages %}
        <div class="mb-6">
            {% for message in messages %}
                <div class="p-4 rounded-md mb-2 text-sm font-medium
                    {% if message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
                    {% else %}bg-green-50 text-green-800 border border-green-200{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div class="mb-6 text-sm text-gray-600 text-center">
        We've sent a 6-digit one-time password to <span class="font-semibold text-gray-800">{{ user_email }}</span>.
    </div>

    <!-- OTP Form -->
    <form method="POST" action="{% url 'verify_otp' %}">
        {% csrf_token %}

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Enter OTP
            </label>
            <input type="text" name="otp" required maxlength="6" pattern="\d{6}" placeholder="123456"
                   class="w-full border border-gray-300 rounded-lg px-4 py-3 text-center text-xl tracking-[0.5em] focus:outline-none focus:border-green-700 focus:ring-1 focus:ring-green-700 transition">
        </div>

        <button type="submit"
                class="w-full bg-green-800 text-white font-semibold py-3 rounded-lg hover:bg-green-900 transition-all duration-300 shadow-md">
            Verify & Activate Account
        </button>

    </form>

    <div class="mt-6 text-center">
        <a href="{% url 'register' %}" class="text-sm text-gray-500 hover:text-green-800 hover:underline transition">
            &larr; Back to Registration
        </a>
    </div>

</div>

</body>
</html>
