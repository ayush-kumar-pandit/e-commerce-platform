{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Chaitanya Divyam</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center px-4">

    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md text-center">
        <h1 class="text-3xl font-bold text-green-800 mb-4">
            Profile
        </h1>

        <p class="text-gray-600 mb-2">
            Welcome, <span class="font-semibold">{{ request.user.username }}</span>
        </p>

        <p class="text-gray-500 mb-6">
            Email: {{ request.user.email }}
        </p>

        <div class="flex justify-center gap-4">
            <a href="{% url 'home' %}"
               class="border border-green-800 text-green-800 px-5 py-2 rounded hover:bg-green-800 hover:text-white transition">
                Home
            </a>

            <a href="{% url 'logout' %}"
               class="bg-green-800 text-white px-5 py-2 rounded hover:bg-green-900 transition">
                Logout
            </a>
        </div>
    </div>

</body>
</html>
