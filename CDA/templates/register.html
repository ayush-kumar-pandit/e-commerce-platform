{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Bharat Sanjeevani</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body class="bg-cream flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-white shadow-xl rounded-lg p-10">

    <!-- Logo -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-green-800">
            BHARAT<span class="font-light text-gray-400">SANJEEVANI</span>
        </h1>

        <p class="text-gray-500 text-sm mt-2">
            Create your account 🌿
        </p>
    </div>

    <form method="POST">
        {% csrf_token %}

        {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-2">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-500 text-xs italic">{{ field.errors|striptags }}</p>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit"
                class="w-full bg-green-800 text-white py-3 rounded hover:bg-green-900 transition">
            Create Account
        </button>

    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="{% url 'login' %}" class="text-green-800 font-semibold hover:underline">
            Login
        </a>
    </p>

</div>

</body>
</html>
