{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Chaitanya Divyam</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body class="bg-cream flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-white shadow-xl rounded-lg p-10">

    <!-- Logo -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-green-800">
            CHAITANYA <span class="font-light text-gray-400">DIVYAM</span>
        </h1>
        <p class="text-gray-500 text-sm mt-2">
            Login to your account 🌿
        </p>
    </div>

    <!-- Login Form -->
    <form method="POST">
        {% csrf_token %}

        <div class="mb-5">
            <label class="block text-sm text-gray-600 mb-2">
                Username
            </label>

            <input type="text"
                   name="username"
                   class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-green-700"
                   placeholder="Enter username"
                   required>
        </div>

        <div class="mb-6">
            <label class="block text-sm text-gray-600 mb-2">
                Password
            </label>

            <input type="password"
                   name="password"
                   class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-green-700"
                   placeholder="Enter password"
                   required>
        </div>

        <button type="submit"
                class="w-full bg-green-800 text-white py-3 rounded hover:bg-green-900 transition">
            Login
        </button>

    </form>

    <!-- Register link -->
    <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="{% url 'register' %}" class="text-green-800 font-semibold hover:underline">
            Register
        </a>
    </p>

</div>

</body>
</html>
